# render.yaml
# Render deployment configuration file

services:
  - type: web
    name: livestock-guardian-biometric
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn fastapi_server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0